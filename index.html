<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARY-KATE ARMSTRONG</title>
    <style>
        :root {
            --navy: #001f3f;
            --light-pink: #fce4ec;
            --accent-pink: #f06292;
            --white: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--navy) !important; /* Back to Navy */
            margin: 0;
            padding: 20px;
            color: var(--white);
            text-align: center;
        }

        h1 { color: var(--accent-pink); text-transform: uppercase; letter-spacing: 2px; }

        /* Game Section */
        .section-container { margin: 40px 0; }
        iframe { border: 3px solid var(--accent-pink); border-radius: 15px; }

        /* Pilates Tracker */
        #pilates-box {
            border: 2px solid var(--accent-pink);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
        }
        #count { font-size: 3.5rem; color: var(--accent-pink); font-weight: bold; }

        /* Favorite Cards */
        .favorites-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .flip-card { background-color: transparent; width: 240px; height: 100px; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 2px solid var(--accent-pink); font-weight: bold; }
        .card-front { background-color: var(--navy); color: var(--white); }
        .card-back { background-color: var(--accent-pink); color: var(--navy); transform: rotateY(180deg); padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>MARY-KATE ELIZABETH ARMSTRONG</h1>

    <div class="section-container">
        <h2 style="color: var(--accent-pink);">IN-FLIGHT ENTERTAINMENT</h2>
        <iframe src="skydash.html" width="350" height="500" style="border:none;" scrolling="no"></iframe>
    </div>

    <div id="pilates-box">
        <h3 style="margin-top:0;">HOT PILATES TRACKER</h3>
        <div id="count">0</div>
        <p style="margin-bottom:0;">Classes Completed This Week</p>
    </div>

    <div class="section-container">
        <h2 style="color: var(--accent-pink);">CINCINNATI FAVORITES</h2>
        <div class="favorites-grid">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="card-front">Tropical Smoothie</div>
                    <div class="card-back">Bahama Mama</div>
                </div>
            </div>
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="card-front">Ichiban</div>
                    <div class="card-back">Spicy Tuna Roll & Million Dollar Roll</div>
                </div>
            </div>
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="card-front">Pepp & Dolores</div>
                    <div class="card-back">Spicy Penne Vodka</div>
                </div>
            </div>
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="card-front">Haven Cafe</div>
                    <div class="card-back">Cinnamon Toast Crunch Latte</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Automatic Pilates Tracker Logic
        const today = new Date().getDay(); // 0=Sun, 1=Mon, 2=Tue...
        let classCount = 0;
        if (today >= 1) classCount++; // Monday happened
        if (today >= 3) classCount++; // Wednesday happened
        if (today >= 5) classCount++; // Friday happened
        document.getElementById('count').innerText = classCount;
    </script>

</body>
</html>
