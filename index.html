<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARY-KATE ARMSTRONG</title>
    <style>
        :root { 
            --navy: #001f3f; 
            --light-pink: #fce4ec; 
            --accent-pink: #f06292;
            --white: #ffffff;
        }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--light-pink) !important; 
            background-image: none !important; /* Forces polka dots to disappear */
            margin: 0; 
            padding: 0; 
            color: var(--navy); 
        }

        header { 
            background: var(--navy); 
            color: var(--white); 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 6px solid var(--accent-pink); 
        }

        h1 { margin: 0; font-size: 2.8rem; letter-spacing: 5px; text-transform: uppercase; }

        .container { 
            max-width: 950px; 
            margin: 40px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
        }

        .card { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid var(--navy);
        }

        .full-width { grid-column: 1 / -1; }
        h2 { margin-top: 0; font-size: 1.2rem; color: var(--navy); border-bottom: 2px solid var(--light-pink); padding-bottom: 10px; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 3px solid var(--navy); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .progress-container { background: #eee; border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: var(--navy); height: 100%; width: 0%; transition: width 0.5s ease; }
        
        button { 
            padding: 12px; border-radius: 8px; border: none; 
            background: var(--navy); color: var(--white); 
            font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--accent-pink); }

        .fav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .fav-item { background: var(--light-pink); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: bold; border: 1px solid var(--accent-pink); }
    </style>
</head>
<body>

<header>
    <h1>MARY-KATE ARMSTRONG</h1>
</header>

<div class="container">
    <div class="card full-width">
        <h2>✈️ LIVE DELTA HUB AIRPORT FEED</h2>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC8n4X9P5ZfW_oM4tG_XyDjg&autoplay=1&mute=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <div class="card">
        <h2>🧘 BODY ALIVE WEEKLY GOAL</h2>
        <div class="progress-container"><div id="classBar" class="progress-bar"></div></div>
        <div style="text-align:center; font-weight:bold;"><span id="classCount">0</span> / 4 CLASSES COMPLETED</div>
        <button onclick="addClass()" style="margin-top:15px;">LOG CLASS</button>
    </div>

    <div class="card">
        <h2>📍 CINCY FAVORITES</h2>
        <div class="fav-grid">
            <div class="fav-item">Haven Cafe</div>
            <div class="fav-item">Pepp & Dolores</div>
            <div class="fav-item">Ichiban</div>
            <div class="fav-item">Tropical Smoothie</div>
        </div>
    </div>
</div>

<script>
    let classes = 0;
    function addClass() {
        if (classes < 4) {
            classes++;
            document.getElementById('classBar').style.width = (classes / 4 * 100) + '%';
            document.getElementById('classCount').innerText = classes;
        }
    }
</script>

</body>
</html>
