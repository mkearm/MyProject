<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARY-KATE ARMSTRONG</title>
    <style>
        :root { 
            --navy: #001f3f; 
            --light-pink: #f8bbd0; 
            --accent-pink: #f48fb1;
        }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--light-pink) !important; 
            background-image: none !important; /* This kills the dots */
            margin: 0; 
            padding: 0; 
            color: var(--navy); 
        }

        header { 
            background: var(--navy); 
            color: var(--light-pink); 
            padding: 70px 20px; 
            text-align: center; 
            border-bottom: 8px solid var(--accent-pink); 
        }

        h1 { 
            margin: 0; 
            font-size: 2.8rem; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
        }

        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid var(--accent-pink);
        }

        .full-width { grid-column: 1 / -1; }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid var(--light-pink); padding-bottom: 10px; }

        .map-container { border-radius: 10px; overflow: hidden; border: 2px solid var(--navy); height: 400px; }
        
        .progress-container { background: #eee; border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: var(--navy); height: 100%; width: 0%; transition: width 0.5s ease; }
        
        button { 
            padding: 12px; border-radius: 8px; border: none; 
            background: var(--navy); color: var(--light-pink); 
            font-weight: bold; width: 100%; cursor: pointer; 
        }

        .fav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .fav-item { background: var(--light-pink); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>MARY-KATE ARMSTRONG</h1>
</header>

<div class="container">
    <div class="card full-width">
        <h2>✈️ DELTA FLEET TRACKER (CVG)</h2>
        <div class="map-container">
            <iframe src="https://www.flightradar24.com/simple_index.php?lat=39.04&lon=-84.66&z=9" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <div class="card">
        <h2>🧘 BODY ALIVE PROGRESS</h2>
        <div class="progress-container"><div id="classBar" class="progress-bar"></div></div>
        <div style="text-align:center; font-weight:bold;"><span id="classCount">0</span> / 4 CLASSES</div>
        <button onclick="addClass()" style="margin-top:15px;">LOG CLASS</button>
    </div>

    <div class="card">
        <h2>📍 CINCY FAVORITES</h2>
        <div class="fav-grid">
            <div class="fav-item">Haven Cafe</div>
            <div class="fav-item">Pepp & Dolores</div>
            <div class="fav-item">Ichiban</div>
            <div class="fav-item">Tropical Smoothie</div>
        </div>
    </div>
</div>

<script>
    let classes = 0;
    function addClass() {
        if (classes < 4) {
            classes++;
            document.getElementById('classBar').style.width = (classes / 4 * 100) + '%';
            document.getElementById('classCount').innerText = classes;
        }
    }
</script>

</body>
</html>
